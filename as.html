<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Auto Responder</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; }
    .response { margin-top: 20px; color: green; font-weight: bold; }
  </style>
</head>
<body>
  <h2>Contact Us</h2>
  <form id="contactForm">
    <label for="name">Your Name:</label><br>
    <input type="text" id="name" name="name" required><br><br>

    <label for="message">Your Message:</label><br>
    <textarea id="message" name="message" required></textarea><br><br>

    <button type="submit">Send</button>
  </form>

  <div class="response" id="autoResponse"></div>

  <script>
    document.getElementById("contactForm").addEventListener("submit", function(event) {
      event.preventDefault(); // prevent actual form submission

      const name = document.getElementById("name").value;
      const responseBox = document.getElementById("autoResponse");

      // Simple auto-response logic
      responseBox.textContent = "Thank you, " + name + "! We’ve received your message and will reply soon.";
    });
  </script>
</body>
</html>
